name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HUSKY: 0

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run typecheck

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run test

  migration-dryrun:
    name: Migration Dry-Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate seed file count
        run: |
          COUNT=$(ls supabase/seeds/*.sql 2>/dev/null | wc -l)
          echo "Found $COUNT seed files"
          [ "$COUNT" -ge 6 ] || (echo "Expected ≥6 seed files" && exit 1)
      - name: Supabase migration dry-run (requires Supabase CLI + Docker in CI)
        run: echo "TODO Stage 2 follow-up — wire supabase db push --dry-run with Supabase CLI action"
