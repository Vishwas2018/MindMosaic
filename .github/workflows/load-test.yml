name: Load Test (nightly)

on:
  schedule:
    # 02:00 UTC nightly
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check required secrets
        id: check
        run: |
          if [[ -z "${{ secrets.LOAD_TEST_BASE_URL }}" || -z "${{ secrets.LOAD_TEST_TOKEN }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Load test secrets not configured — skipping (pre-deploy gate not yet open)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'

      - name: Install k6
        if: steps.check.outputs.skip == 'false'
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run session-loop load test
        if: steps.check.outputs.skip == 'false'
        env:
          BASE_URL: ${{ secrets.LOAD_TEST_BASE_URL }}
          TOKEN: ${{ secrets.LOAD_TEST_TOKEN }}
          PATHWAY_ID: ${{ secrets.LOAD_TEST_PATHWAY_ID }}
        run: k6 run k6/session-loop.js
